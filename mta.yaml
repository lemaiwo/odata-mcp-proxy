_schema-version: "3.1"
ID: odata-mcp-proxy
version: 1.0.0
description: Config-driven MCP proxy that exposes OData and REST APIs as MCP tools

parameters:
  enable-parallel-deployments: true

modules:
  - name: odata-mcp-proxy
    type: nodejs
    path: .
    parameters:
      memory: 512M
      disk-quota: 1G
      buildpack: nodejs_buildpack
      health-check-type: http
      health-check-http-endpoint: /health
      health-check-timeout: 180
      command: npm run start:http
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
        - npm prune --production
      ignore:
        - node_modules/
        - src/
        - .git/
        - docs/
        - .taskmaster/
    requires:
      - name: odata-mcp-proxy-destination
      - name: odata-mcp-proxy-connectivity
      - name: odata-mcp-proxy-xsuaa

resources:
  - name: odata-mcp-proxy-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: odata-mcp-proxy-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite

  - name: odata-mcp-proxy-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: xs-security.json
