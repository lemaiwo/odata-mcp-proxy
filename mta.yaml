_schema-version: "3.1"
ID: admin-mcp-server
version: 1.0.0
description: MCP server for SAP BTP Integration Suite administration

parameters:
  enable-parallel-deployments: true

modules:
  - name: admin-mcp-server
    type: nodejs
    path: .
    parameters:
      memory: 512M
      disk-quota: 1G
      buildpack: nodejs_buildpack
      health-check-type: http
      health-check-http-endpoint: /health
      health-check-timeout: 180
      command: npm run start:http
    build-parameters:
      builder: npm
      build-commands:
        - npm i
        - npm run build
      ignore:
        - node_modules/
        - src/
        - .git/
        - docs/
        - .taskmaster/
    requires:
      - name: admin-mcp-destination
      - name: admin-mcp-connectivity
      - name: admin-mcp-xsuaa

resources:
  - name: admin-mcp-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: admin-mcp-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite

  - name: admin-mcp-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: xs-security.json
